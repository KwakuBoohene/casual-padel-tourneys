services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./.env
    environment:
      # Use Compose service names; localhost inside the container is the container itself
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
      - redis
    ports:
      - "3004:3004"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ./.env
    environment:
      # Server-side fetch from container uses service name; client (browser) needs public URL
      INTERNAL_API_BASE_URL: http://api:3004
      PUBLIC_API_BASE_URL: http://localhost:3004
    depends_on:
      - api
    ports:
      - "3005:3005"

  mobile:
    build:
      context: ..
      dockerfile: apps/mobile/Dockerfile
    env_file:
      - ./.env
    depends_on:
      - api
    ports:
      - "8081:8081"

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5400:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6579:6379"

volumes:
  postgres_data:
