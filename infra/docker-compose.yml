services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
    ports:
      - "3004:3004"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ./.env
    depends_on:
      - api
    ports:
      - "3000:3000"

  mobile:
    build:
      context: ..
      dockerfile: apps/mobile/Dockerfile
    env_file:
      - ../apps/mobile/.env
    depends_on:
      - api
    ports:
      - "8081:8081"

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
